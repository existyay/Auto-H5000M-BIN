name: Build ImmortalWrt H5000M

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      enable_adguardhome:
        description: '启用 AdGuardHome'
        required: false
        default: false
        type: boolean
      enable_openclash:
        description: '启用 OpenClash'
        required: false
        default: false
        type: boolean
      enable_nikki:
        description: '启用 Nikki'
        required: false
        default: false
        type: boolean
      enable_upnp:
        description: '启用 UPnP'
        required: false
        default: false
        type: boolean
      enable_vlmcsd:
        description: '启用 VLMCSd'
        required: false
        default: false
        type: boolean
      enable_mosdns:
        description: '启用 MosDNS'
        required: false
        default: false
        type: boolean
      enable_dockerman:
        description: '启用 DockerMan'
        required: false
        default: false
        type: boolean
      enable_qmodem_next:
        description: '启用 QModem Next (新版)'
        required: false
        default: false
        type: boolean
      enable_qmodem:
        description: '启用 QModem (旧版)'
        required: false
        default: false
        type: boolean
      enable_mwan:
        description: '启用 MWAN (多WAN负载均衡)'
        required: false
        default: false
        type: boolean
      enable_homeproxy:
        description: '启用 HomeProxy'
        required: false
        default: false
        type: boolean
      enable_adbyby_plus:
        description: '启用 Adbyby Plus'
        required: false
        default: false
        type: boolean
      enable_original_modem:
        description: '启用原版 Modem'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-24.10
  REPO_BRANCH: mt798x-mt799x-6.6-mtwifi
  CONFIG_URL: https://raw.githubusercontent.com/padavanonly/immortalwrt-mt798x-6.6/refs/heads/mt798x-mt799x-6.6-mtwifi/defconfig/mt7987_mt7992.config
  SOURCE_DIR: immortalwrt
  TZ: Asia/Shanghai

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      enable_adguardhome: ${{ steps.set-env.outputs.enable_adguardhome }}
      enable_openclash: ${{ steps.set-env.outputs.enable_openclash }}
      enable_nikki: ${{ steps.set-env.outputs.enable_nikki }}
      enable_upnp: ${{ steps.set-env.outputs.enable_upnp }}
      enable_vlmcsd: ${{ steps.set-env.outputs.enable_vlmcsd }}
      enable_mosdns: ${{ steps.set-env.outputs.enable_mosdns }}
      enable_dockerman: ${{ steps.set-env.outputs.enable_dockerman }}
      enable_qmodem_next: ${{ steps.set-env.outputs.enable_qmodem_next }}
      enable_qmodem: ${{ steps.set-env.outputs.enable_qmodem }}
      enable_mwan: ${{ steps.set-env.outputs.enable_mwan }}
      enable_homeproxy: ${{ steps.set-env.outputs.enable_homeproxy }}
      enable_adbyby_plus: ${{ steps.set-env.outputs.enable_adbyby_plus }}
      enable_original_modem: ${{ steps.set-env.outputs.enable_original_modem }}
    steps:
      - name: 设置环境变量
        id: set-env
        run: |
          for var in adguardhome openclash nikki upnp vlmcsd mosdns dockerman qmodem_next qmodem mwan homeproxy adbyby_plus original_modem; do
            value="${!var}"
            [ -z "$value" ] && value="false"
            echo "enable_$var=$value" >> $GITHUB_OUTPUT
          done

      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 环境准备
        run: |
          echo "🔧 准备构建环境..."
          sudo rm -rf /home/runner/actions-runner/cached/_diag/* 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          AVAIL_GB=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          echo "💾 可用磁盘空间: ${AVAIL_GB}GB"
          if [ "$AVAIL_GB" -lt 6 ]; then
            echo "❌ 磁盘空间不足"
            exit 1
          fi
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git ccache python3 python3-pip \
            libncurses5-dev libssl-dev libgmp3-dev libmbedtls-dev rustc cargo \
            golang-go autoconf automake libtool patch make gcc g++
          export PATH="/usr/lib/ccache:$PATH"
          ccache --version || true

      - name: 恢复构建缓存
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SOURCE_DIR }}/dl
            ${{ env.SOURCE_DIR }}/staging_dir
            ${{ env.SOURCE_DIR }}/build_dir
            ~/.ccache
          key: ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-${{ hashFiles('feeds.conf.default', 'h5000m.extra.config') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-

      - name: 源码准备
        run: |
          if [ ! -d "$SOURCE_DIR" ] || [ ! -d "$SOURCE_DIR/.git" ]; then
            echo "📥 克隆源码..."
            rm -rf "$SOURCE_DIR" 2>/dev/null || true
            git clone -b $REPO_BRANCH --single-branch --depth=1 $REPO_URL $SOURCE_DIR
          else
            echo "🔄 检查源码更新..."
            cd $SOURCE_DIR
            CURRENT_BRANCH=$(git branch --show-current)
            if [ "$CURRENT_BRANCH" != "$REPO_BRANCH" ]; then
              cd ..
              rm -rf "$SOURCE_DIR"
              git clone -b $REPO_BRANCH --single-branch --depth=1 $REPO_URL $SOURCE_DIR
            else
              git fetch origin $REPO_BRANCH
              LOCAL_COMMIT=$(git rev-parse HEAD)
              REMOTE_COMMIT=$(git rev-parse FETCH_HEAD)
              if [ "$LOCAL_COMMIT" != "$REMOTE_COMMIT" ]; then
                git reset --hard FETCH_HEAD
              fi
            fi
            cd ..
          fi
          cd $SOURCE_DIR
          if [ -f "$GITHUB_WORKSPACE/feeds.conf.default" ]; then
            cp "$GITHUB_WORKSPACE/feeds.conf.default" ./feeds.conf.default
          fi
          rm -rf feeds/nikki feeds/nikki.* feeds/nikki* feeds/nikki.index 2>/dev/null || true
          if [ "${{ steps.set-env.outputs.enable_nikki }}" != "true" ]; then
            sed -i '/src-git nikki/d' feeds.conf.default
          fi
          if [ "${{ steps.set-env.outputs.enable_qmodem_next }}" != "true" ] && [ "${{ steps.set-env.outputs.enable_qmodem }}" != "true" ]; then
            sed -i '/qmodem/d' feeds.conf.default
          fi
          if [ "${{ steps.set-env.outputs.enable_adbyby_plus }}" = "true" ]; then
            if ! grep -q "coolsnowwolf_luci" feeds.conf.default; then
              echo 'src-git coolsnowwolf_luci https://github.com/coolsnowwolf/luci.git;master' >> feeds.conf.default
            fi
          else
            sed -i '/coolsnowwolf_luci/d' feeds.conf.default
          fi
          echo "🔄 更新 feeds..."
          ./scripts/feeds update -a -j $(nproc)
          ./scripts/feeds install -a -f -j $(nproc)

      - name: 修复驱动兼容性
        run: |
          cd $SOURCE_DIR
          echo "🔧 修复 qmi_wwan_f 驱动 Linux 6.6 兼容性..."
          QMI_WWAN_F="package/mtk/applications/5g-modem/fibocom_QMI_WWAN/qmi_wwan_f.c"
          if [ -f "$QMI_WWAN_F" ]; then
            sed -i 's/u64_stats_fetch_begin_irq(/u64_stats_fetch_begin(/g' "$QMI_WWAN_F"
            sed -i 's/u64_stats_fetch_retry_irq(/u64_stats_fetch_retry(/g' "$QMI_WWAN_F"
            sed -i 's/memcpy (qmap_net->dev_addr, real_dev->dev_addr,/memcpy (qmap_net->dev_addr, (void *)real_dev->dev_addr,/g' "$QMI_WWAN_F"
            echo "✅ qmi_wwan_f 修复完成"
          fi
          if [ "${{ steps.set-env.outputs.enable_adguardhome }}" = "true" ]; then
            [ ! -d "package/luci-app-adguardhome" ] && \
              git clone --depth=1 https://github.com/kongfl888/luci-app-adguardhome.git package/luci-app-adguardhome
          fi
          if [ "${{ steps.set-env.outputs.enable_mosdns }}" = "true" ]; then
            if [ ! -d "feeds/packages/lang/golang" ] || [ ! -f "feeds/packages/lang/golang/Makefile" ]; then
              rm -rf feeds/packages/lang/golang
              git clone https://github.com/sbwml/packages_lang_golang -b 24.x feeds/packages/lang/golang
            fi
            [ ! -d "package/mosdns" ] && \
              git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
            [ ! -d "package/v2ray-geodata" ] && \
              git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata
          fi
          rm -rf package/feeds/packages/{exim,onionshare-cli,python-zope-event,python-zope-interface,python-gevent,python-twisted} 2>/dev/null || true
          rm -rf package/feeds/qmodem/ndisc6 2>/dev/null || true
          QMODEM_MK="package/feeds/qmodem/qmodem/Makefile"
          [ -f "$QMODEM_MK" ] && sed -i 's/DEPENDS:=.*+kmod-mhi-wwan/# &/g' "$QMODEM_MK"
          MT_HWIFI_MK="package/mtk/drivers/mt_hwifi/Makefile"
          [ -f "$MT_HWIFI_MK" ] && sed -i 's/+kmod-mt_wifi_osal//g' "$MT_HWIFI_MK"

      - name: 配置构建
        env:
          ENABLE_ADGUARDHOME: ${{ steps.set-env.outputs.enable_adguardhome }}
          ENABLE_OPENCLASH: ${{ steps.set-env.outputs.enable_openclash }}
          ENABLE_NIKKI: ${{ steps.set-env.outputs.enable_nikki }}
          ENABLE_UPNP: ${{ steps.set-env.outputs.enable_upnp }}
          ENABLE_VLMCSD: ${{ steps.set-env.outputs.enable_vlmcsd }}
          ENABLE_MOSDNS: ${{ steps.set-env.outputs.enable_mosdns }}
          ENABLE_DOCKERMAN: ${{ steps.set-env.outputs.enable_dockerman }}
          ENABLE_MWAN: ${{ steps.set-env.outputs.enable_mwan }}
          ENABLE_HOMEPROXY: ${{ steps.set-env.outputs.enable_homeproxy }}
          ENABLE_ADBYBY_PLUS: ${{ steps.set-env.outputs.enable_adbyby_plus }}
          ENABLE_QMODEM_NEXT: ${{ steps.set-env.outputs.enable_qmodem_next }}
          ENABLE_QMODEM: ${{ steps.set-env.outputs.enable_qmodem }}
          ENABLE_ORIGINAL_MODEM: ${{ steps.set-env.outputs.enable_original_modem }}
        run: |
          cd $SOURCE_DIR
          echo "⚙️ 配置构建选项..."
          if [ "$ENABLE_QMODEM_NEXT" = "true" ] && [ "$ENABLE_QMODEM" = "true" ]; then
            echo "❌ 不能同时启用 QModem Next 和 QModem"
            exit 1
          fi
          if [ "$ENABLE_ORIGINAL_MODEM" = "true" ] && [ "$ENABLE_QMODEM_NEXT" = "true" ]; then
            echo "❌ 不能同时启用原版 Modem 和 QModem Next"
            exit 1
          fi
          if [ "$ENABLE_ORIGINAL_MODEM" = "true" ] && [ "$ENABLE_QMODEM" = "true" ]; then
            echo "❌ 不能同时启用原版 Modem 和 QModem"
            exit 1
          fi
          curl -fsSL "$CONFIG_URL" -o base.config || {
            [ -f "defconfig/mt7987_mt7992.config" ] && cp defconfig/mt7987_mt7992.config base.config
          }
          cat base.config > .config
          if [ -f "$GITHUB_WORKSPACE/h5000m.extra.config" ]; then
            cat "$GITHUB_WORKSPACE/h5000m.extra.config" >> .config
          fi
          disabled_pkgs=("luci-app-sms-tool-lite" "luci-app-3ginfo-lite")
          [ "$ENABLE_ADGUARDHOME" = "true" ] && echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config || disabled_pkgs+=("luci-app-adguardhome")
          [ "$ENABLE_OPENCLASH" = "true" ] && echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config || disabled_pkgs+=("luci-app-openclash")
          [ "$ENABLE_NIKKI" = "true" ] && echo "CONFIG_PACKAGE_luci-app-nikki=y" >> .config || disabled_pkgs+=("luci-app-nikki")
          [ "$ENABLE_UPNP" = "true" ] && echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config || disabled_pkgs+=("luci-app-upnp")
          [ "$ENABLE_VLMCSD" = "true" ] && echo "CONFIG_PACKAGE_luci-app-vlmcsd=y" >> .config || disabled_pkgs+=("luci-app-vlmcsd")
          [ "$ENABLE_MOSDNS" = "true" ] && echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config || disabled_pkgs+=("luci-app-mosdns")
          [ "$ENABLE_DOCKERMAN" = "true" ] && echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config || disabled_pkgs+=("luci-app-dockerman")
          [ "$ENABLE_MWAN" = "true" ] && echo "CONFIG_PACKAGE_luci-app-mwan=y" >> .config || disabled_pkgs+=("luci-app-mwan")
          [ "$ENABLE_HOMEPROXY" = "true" ] && echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config || disabled_pkgs+=("luci-app-homeproxy")
          [ "$ENABLE_ADBYBY_PLUS" = "true" ] && echo "CONFIG_PACKAGE_luci-app-adbyby_plus=y" >> .config || disabled_pkgs+=("luci-app-adbyby_plus")
          if [ "$ENABLE_ORIGINAL_MODEM" = "true" ]; then
            echo "CONFIG_PACKAGE_luci-app-modem=y" >> .config
            echo "CONFIG_PACKAGE_modem=y" >> .config
          else
            disabled_pkgs+=("luci-app-modem" "modem")
          fi
          if [ "$ENABLE_QMODEM_NEXT" = "true" ]; then
            echo "CONFIG_PACKAGE_luci-app-qmodem-next=y" >> .config
          elif [ "$ENABLE_QMODEM" = "true" ]; then
            echo "CONFIG_PACKAGE_luci-app-qmodem=y" >> .config
            echo "CONFIG_PACKAGE_luci-compat=y" >> .config
            echo "CONFIG_PACKAGE_qmodem=y" >> .config
            echo "CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_vendor-qmi-wwan=y" >> .config
            echo "# CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_generic-qmi-wwan is not set" >> .config
            echo "CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_ndisc6=y" >> .config
            echo "# CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_rdisc6 is not set" >> .config
            echo "# CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_no_ndisc_rdisc6 is not set" >> .config
            echo "CONFIG_PACKAGE_ndisc6=y" >> .config
            echo "CONFIG_PACKAGE_luci-app-qmodem_USE_TOM_CUSTOMIZED_QUECTEL_CM=y" >> .config
            echo "# CONFIG_PACKAGE_luci-app-qmodem_USING_QWRT_QUECTEL_CM_5G is not set" >> .config
            echo "# CONFIG_PACKAGE_luci-app-qmodem_USING_NORMAL_QUECTEL_CM is not set" >> .config
            echo "CONFIG_PACKAGE_quectel-CM-5G-M=y" >> .config
            echo "CONFIG_PACKAGE_sms-tool_q=y" >> .config
            echo "CONFIG_PACKAGE_ubus-at-daemon=y" >> .config
            echo "CONFIG_PACKAGE_tom_modem=y" >> .config
            echo "CONFIG_PACKAGE_kmod-qmi_wwan_q=y" >> .config
            echo "CONFIG_PACKAGE_kmod-qmi_wwan_f=y" >> .config
            echo "CONFIG_PACKAGE_kmod-qmi_wwan_s=y" >> .config
            echo "CONFIG_PACKAGE_mwan3=y" >> .config
            echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config
            echo "CONFIG_PACKAGE_mtkhqos_util=y" >> .config
          else
            disabled_pkgs+=("luci-app-qmodem-next" "luci-app-qmodem")
          fi
          make defconfig
          all_disabled=("luci-app-wrtbwmon" "luci-app-rclone" "rclone" "rclone-ng" "rclone-webui-react" "${disabled_pkgs[@]}")
          for pkg in "${all_disabled[@]}"; do
            sed -i "/^CONFIG_PACKAGE_${pkg}=/d" .config
            echo "# CONFIG_PACKAGE_${pkg} is not set" >> .config
          done
          echo "✅ 配置完成"

      - name: 预下载依赖
        run: |
          cd $SOURCE_DIR
          echo "📥 预下载构建依赖..."
          if [ -z "$(ls -A dl 2>/dev/null)" ]; then
            make download -j$(nproc) || echo "⚠️ 下载失败，将在构建时重试"
          else
            echo "✅ 依赖已缓存"
          fi

      - name: 预构建工具链
        run: |
          cd $SOURCE_DIR
          echo "🔧 预构建工具链..."
          if [ ! -d "staging_dir" ] || [ -z "$(ls -A staging_dir 2>/dev/null)" ]; then
            make toolchain/install -j$(nproc) || echo "⚠️ 工具链构建失败，将在构建时重试"
          else
            echo "✅ 工具链已缓存"
          fi

      - name: 打包源码
        run: |
          echo "📦 打包源码..."
          tar --exclude="$SOURCE_DIR/build_dir" --exclude="$SOURCE_DIR/tmp" -czf source.tar.gz $SOURCE_DIR $GITHUB_WORKSPACE/h5000m.extra.config $GITHUB_WORKSPACE/feeds.conf.default 2>/dev/null || true

      - name: 上传源码
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ github.run_number }}
          path: source.tar.gz
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: 下载源码
        uses: actions/download-artifact@v4
        with:
          name: source-${{ github.run_number }}

      - name: 解压源码
        run: |
          echo "📦 解压源码..."
          tar -xzf source.tar.gz
          echo "✅ 源码解压完成"

      - name: 深度清理磁盘
        run: |
          echo "🧹 深度清理磁盘..."
          docker rmi $(docker images -q) 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /etc/mysql /etc/php \
            /usr/local/share/boost /usr/share/swift /opt/hostedtoolcache /usr/local/.ghcup \
            /usr/local/graalvm /imagegeneration /opt /var/cache/apt/archives/* \
            /etc/apt/sources.list.d/* 2>/dev/null || true
          sudo apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* \
            google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* \
            mongodb* moby* snap* 2>/dev/null || true
          sudo apt-get autoremove --purge -y && sudo apt-get clean && sudo apt-get autoclean
          sudo rm -rf /tmp/* /var/tmp/* /var/log/* ~/.cache/* 2>/dev/null || true
          AVAIL_GB=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          echo "✅ 清理后可用空间: ${AVAIL_GB}GB"

      - name: 编译固件
        run: |
          cd $SOURCE_DIR
          THREADS=$(nproc)
          export PATH="/usr/lib/ccache:$PATH"
          echo "🔨 开始编译 (${THREADS} 线程)..."
          echo "📊 CCache 统计 (开始):"
          ccache -s || true
          START_TIME=$(date +%s)
          if [ -z "$(ls -A dl 2>/dev/null)" ] || ! make download -j$THREADS 2>&1 | head -20; then
            echo "⚠️ 下载依赖..."
            find dl -size -1024c -delete 2>/dev/null || true
            make download -j$THREADS
          fi
          if make -j$THREADS IGNORE_ERRORS=n; then
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "✅ 编译成功 (耗时: ${DURATION}s)"
            echo "📊 CCache 统计 (结束):"
            ccache -s || true
          else
            echo "⚠️ 并行编译失败，尝试单线程调试..."
            make -j1 V=s || exit 1
          fi

      - name: 打包产物
        run: |
          cd $SOURCE_DIR
          echo "📦 打包产物..."
          mkdir -p ../artifacts
          find bin/targets -type f \( -name "*.bin" -o -name "*.img.gz" \) -exec cp {} ../artifacts/ \; 2>/dev/null || true
          cd ..
          tar -czf artifacts.tar.gz artifacts/ 2>/dev/null || true

      - name: 验证产物
        run: |
          echo "🔍 验证产物..."
          if [ -z "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "⚠️ 没有找到产物文件"
            exit 0
          else
            echo "✅ 产物验证通过"
            ls -lh artifacts/
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ github.run_number }}
          path: artifacts.tar.gz
          retention-days: 30

  release:
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    if: success()
    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: artifacts-${{ github.run_number }}

      - name: 解压产物
        run: |
          echo "📦 解压产物..."
          tar -xzf artifacts.tar.gz
          echo "✅ 产物解压完成"

      - name: 收集产物
        run: |
          if [ -z "$(ls -A artifacts/ 2>/dev/null)" ]; then
            echo "⚠️ 没有找到产物文件"
            exit 0
          fi
          cat > artifacts/MANIFEST.txt << 'EOF'
          ╔════════════════════════════════════════════════╗
          ║    ImmortalWrt H5000M 固件构建信息             ║
          ╚════════════════════════════════════════════════╝
          EOF
          echo "" >> artifacts/MANIFEST.txt
          echo "📅 构建时间: $(date '+%Y-%m-%d %H:%M:%S')" >> artifacts/MANIFEST.txt
          echo "🔗 运行 ID: ${{ github.run_id }}" >> artifacts/MANIFEST.txt
          echo "🏷️  Build #: ${{ github.run_number }}" >> artifacts/MANIFEST.txt
          echo "" >> artifacts/MANIFEST.txt
          echo "⚙️ 启用的功能:" >> artifacts/MANIFEST.txt
          echo "• AdGuardHome:   ${{ needs.prepare.outputs.enable_adguardhome }}" >> artifacts/MANIFEST.txt
          echo "• OpenClash:     ${{ needs.prepare.outputs.enable_openclash }}" >> artifacts/MANIFEST.txt
          echo "• Nikki:         ${{ needs.prepare.outputs.enable_nikki }}" >> artifacts/MANIFEST.txt
          echo "• UPnP:          ${{ needs.prepare.outputs.enable_upnp }}" >> artifacts/MANIFEST.txt
          echo "• VLMCSd:        ${{ needs.prepare.outputs.enable_vlmcsd }}" >> artifacts/MANIFEST.txt
          echo "• MosDNS:        ${{ needs.prepare.outputs.enable_mosdns }}" >> artifacts/MANIFEST.txt
          echo "• DockerMan:     ${{ needs.prepare.outputs.enable_dockerman }}" >> artifacts/MANIFEST.txt
          echo "• QModem Next:   ${{ needs.prepare.outputs.enable_qmodem_next }}" >> artifacts/MANIFEST.txt
          echo "• QModem:        ${{ needs.prepare.outputs.enable_qmodem }}" >> artifacts/MANIFEST.txt
          echo "• MWAN:          ${{ needs.prepare.outputs.enable_mwan }}" >> artifacts/MANIFEST.txt
          echo "• HomeProxy:     ${{ needs.prepare.outputs.enable_homeproxy }}" >> artifacts/MANIFEST.txt
          echo "• Adbyby Plus:   ${{ needs.prepare.outputs.enable_adbyby_plus }}" >> artifacts/MANIFEST.txt
          echo "• 原版 Modem:    ${{ needs.prepare.outputs.enable_original_modem }}" >> artifacts/MANIFEST.txt
          echo "" >> artifacts/MANIFEST.txt
          echo "📦 产物文件:" >> artifacts/MANIFEST.txt
          ls -lh artifacts/ | grep -v "^total" | awk '{print "  • " $9 " (" $5 ")"}' >> artifacts/MANIFEST.txt
          echo "✅ 产物收集完成"

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-H5000M-${{ github.run_number }}
          path: artifacts/
          retention-days: 30

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: ImmortalWrt H5000M #${{ github.run_number }}
          body: |
            🎉 **ImmortalWrt H5000M 固件已构建完成**

            📅 时间: ${{ github.event.repository.updated_at }}
            🔗 运行 ID: ${{ github.run_id }}

            **⚙️ 启用的功能:**
            - AdGuardHome: ${{ needs.prepare.outputs.enable_adguardhome }}
            - OpenClash: ${{ needs.prepare.outputs.enable_openclash }}
            - Nikki: ${{ needs.prepare.outputs.enable_nikki }}
            - UPnP: ${{ needs.prepare.outputs.enable_upnp }}
            - VLMCSd: ${{ needs.prepare.outputs.enable_vlmcsd }}
            - MosDNS: ${{ needs.prepare.outputs.enable_mosdns }}
            - DockerMan: ${{ needs.prepare.outputs.enable_dockerman }}
            - MWAN: ${{ needs.prepare.outputs.enable_mwan }}
            - HomeProxy: ${{ needs.prepare.outputs.enable_homeproxy }}
            - Adbyby Plus: ${{ needs.prepare.outputs.enable_adbyby_plus }}
            - 原版 Modem: ${{ needs.prepare.outputs.enable_original_modem }}

            💾 下载产物: 见下方 Artifacts
            📋 详细信息: 见 MANIFEST.txt
          prerelease: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}